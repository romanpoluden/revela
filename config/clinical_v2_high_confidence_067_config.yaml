dataset:
  name: clinical_v2_high_confidence_067
  task: clinical_image_classification_with_lesion_routing
  processed_dir: data/processed/clinical_v2_high_confidence_067
  train_csv: data/processed/clinical_v2_high_confidence_067/train.csv
  val_csv: data/processed/clinical_v2_high_confidence_067/val.csv
  test_csv: data/processed/clinical_v2_high_confidence_067/test.csv
  label_column: target_label
  class_idx_column: class_idx
  image_size: 224
  num_classes: 5
  class_names:
  - Eczema / dermatitis
  - Urticaria / allergic reaction
  - Folliculitis / acne-like
  - Psoriasis / papulosquamous
  - Lesion — dermoscopic review recommended

model:
  architecture: efficientnet_b0
  pretrained: true

training:
  batch_size: 16
  epochs: 5
  num_workers: 0
  learning_rate: 0.0001
  weight_decay: 0.01
  use_class_weights: true
  random_seed: 42
  output_dir: models/clinical_v2_high_confidence_067_effnet_b0

notes:
  - High-confidence SCIN variant of clinical_v2; SCIN rows require top weighted label score >= 0.67.
  - Clinical model is not diagnostic.
  - Lesion class is a routing output, not cancer detection.
  - SCIN rows preserve the clinical_v2 case-aware split by case_id.
  - Fitzpatrick17k rows preserve the clinical_v2 row-level split limitation because case_id/patient_id/lesion_id are unavailable.
  - Preserve source_dataset and report source-specific performance during evaluation.
